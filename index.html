<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CHUAY — รายงานเงินสดรับ-จ่าย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'Inter','Sarabun',system-ui,sans-serif;
  background:#F5F6F2;
  color:#1a1a1a;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  line-height:1.6
}

/* ── DESIGN TOKENS ── */
:root{
  --bg:#F5F6F2;
  --surface:#ffffff;
  --border:#1a1a1a;
  --text:#1a1a1a;
  --text-muted:#6B6F6A;
  --accent:#C9EF3E;
  --shadow:6px 6px 0px #1a1a1a;
  --shadow-sm:3px 3px 0px #1a1a1a;
  --shadow-xs:2px 2px 0px #1a1a1a;
  --radius:16px;
  --radius-sm:10px;
  --transition:all .2s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── TOPBAR ── */
.topbar{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(245,246,242,.98);
  backdrop-filter:blur(20px);
  border-bottom:3px solid var(--border);
  padding:0 28px;
  height:72px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 4px 0 rgba(0,0,0,.05);
}

.logo{
  display:flex;
  align-items:center;
  gap:14px;
  font-weight:900;
  font-size:20px;
  letter-spacing:-.04em;
  color:var(--text);
  text-decoration:none;
  transition:var(--transition);
}

.logo:hover{
  transform:scale(1.05);
}

.logo-mark{
  width:40px;
  height:40px;
  border:3px solid var(--border);
  border-radius:12px;
  background:linear-gradient(135deg,#A5E4FF 0%,#82CBFF 50%,var(--accent) 51%);
  display:grid;
  place-items:center;
  font-size:20px;
  box-shadow:var(--shadow-xs);
  transition:var(--transition);
}

.logo:hover .logo-mark{
  transform:rotate(5deg) scale(1.08);
}

.user-bar{
  display:flex;
  align-items:center;
  gap:14px;
}

.user-pill{
  display:flex;
  align-items:center;
  gap:10px;
  border:2.5px solid var(--border);
  border-radius:999px;
  padding:6px 16px 6px 6px;
  font-size:13px;
  font-weight:700;
  background:var(--surface);
  box-shadow:var(--shadow-xs);
  transition:var(--transition);
  cursor:pointer;
}

.user-pill:hover{
  transform:translate(2px,2px);
  box-shadow:1px 1px 0 var(--border);
}

.user-avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background:var(--accent);
  border:2px solid var(--border);
  display:grid;
  place-items:center;
  font-size:13px;
  font-weight:900;
  flex-shrink:0;
  box-shadow:var(--shadow-xs);
}

.user-email{
  max-width:150px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-weight:600;
}

/* ── MAIN LAYOUT ── */
.main{
  max-width:800px;
  margin:32px auto 100px;
  padding:0 24px;
  display:grid;
  grid-template-columns:1fr;
  gap:24px;
}

/* ── PAGE HEADER ── */
.page-header{
  margin-bottom:12px;
}

.page-title{
  font-size:32px;
  font-weight:900;
  letter-spacing:-.02em;
  margin-bottom:8px;
  color:var(--text);
}

.page-subtitle{
  font-size:16px;
  color:var(--text-muted);
  font-weight:600;
}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:3px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:var(--transition);
}

.card:hover{
  transform:translate(-2px,-2px);
  box-shadow:8px 8px 0px var(--border);
}

.card-head{
  padding:18px 24px;
  border-bottom:3px solid var(--border);
  background:#FAFBF7;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.card-title{
  font-size:15px;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:12px;
  letter-spacing:-.01em;
}

.card-badge{
  font-size:11px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.1em;
  border:2px solid var(--border);
  border-radius:999px;
  padding:4px 12px;
  background:var(--accent);
  box-shadow:var(--shadow-xs);
  white-space:nowrap;
}

.card-body{
  padding:24px;
}

/* ── FORM FIELDS ── */
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.col2{
  grid-column:1/-1;
}

.field{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.field label{
  font-size:13px;
  font-weight:800;
  color:var(--text);
  letter-spacing:-.01em;
  text-transform:uppercase;
}

.field label .req{
  color:#e53e3e;
  margin-left:4px;
  font-weight:900;
}

.field input{
  width:100%;
  border:2.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px 16px;
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  outline:none;
  transition:var(--transition);
  background:var(--surface);
  color:var(--text);
  box-shadow:var(--shadow-xs);
}

.field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(201,239,62,.3),var(--shadow-xs);
  transform:translate(-1px,-1px);
}

.field input::placeholder{
  color:var(--text-muted);
  font-weight:500;
}

/* ── BUTTONS ── */
.form-actions{
  display:flex;
  gap:14px;
  margin-top:16px;
}

.btn{
  border:2.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:14px 24px;
  font:inherit;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:10px;
  box-shadow:var(--shadow);
  transition:var(--transition);
  justify-content:center;
  white-space:nowrap;
  letter-spacing:-.01em;
  text-transform:uppercase;
}

.btn:hover:not(:disabled){
  transform:translate(3px,3px);
  box-shadow:2px 2px 0 var(--border);
}

.btn:active:not(:disabled){
  transform:translate(5px,5px);
  box-shadow:0 0 0 var(--border);
}

.btn:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.btn-primary{
  background:var(--text);
  color:#fff;
  flex:1;
}

.btn-accent{
  background:var(--accent);
  color:var(--text);
  flex:1;
}

.btn-sm{
  padding:10px 16px;
  font-size:12px;
  box-shadow:var(--shadow-xs);
  flex:none;
}

/* ── TABLE ── */
.table-wrap{
  border:2.5px solid var(--border);
  border-radius:var(--radius-sm);
  overflow:hidden;
  background:var(--surface);
  box-shadow:var(--shadow-xs);
}

.tx-table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

.tx-table thead{
  background:var(--text);
  color:#fff;
}

.tx-table th{
  padding:14px 16px;
  text-align:left;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.08em;
  border-bottom:2px solid var(--border);
}

.tx-table td{
  padding:14px 16px;
  border-bottom:2px solid var(--border);
  background:#fff;
}

.tx-table tr:last-child td{
  border-bottom:none;
}

.tx-table tr:nth-child(even) td{
  background:#FAFBF7;
}

.tx-table tr:hover td{
  background:#F0F0E8;
}

.num{
  text-align:right;
  font-family:'Inter',sans-serif;
  font-weight:700;
}

/* ── SUCCESS CARD ── */
.success-card{
  display:none;
  background:var(--surface);
  border:3px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:36px 28px;
  text-align:center;
  margin-bottom:24px;
  animation:slideIn .4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.success-card.show{
  display:block;
}

@keyframes slideIn{
  from{
    opacity:0;
    transform:translateY(-20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.success-icon{
  font-size:56px;
  margin-bottom:16px;
  display:inline-block;
  animation:bounce .6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.success-card h3{
  font-size:22px;
  font-weight:900;
  margin-bottom:20px;
  letter-spacing:-.02em;
}

/* ── OVERLAY ── */
.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:200;
  place-items:center;
  backdrop-filter:blur(8px);
}

.overlay.show{
  display:grid;
}

.overlay-box{
  background:var(--surface);
  border:3px solid var(--border);
  border-radius:20px;
  padding:40px 48px;
  text-align:center;
  box-shadow:8px 8px 0 var(--border);
  max-width:340px;
  width:90%;
  animation:popIn .3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popIn{
  from{
    opacity:0;
    transform:scale(.8);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

.spinner{
  width:44px;
  height:44px;
  border:4px solid #f0f0f0;
  border-top-color:var(--text);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 18px;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.overlay-title{
  font-size:18px;
  font-weight:900;
  margin-bottom:8px;
  letter-spacing:-.01em;
}

.overlay-sub{
  font-size:14px;
  color:var(--text-muted);
  font-weight:600;
}

/* ── TOAST ── */
.toast{
  position:fixed;
  bottom:32px;
  left:50%;
  transform:translateX(-50%);
  background:var(--text);
  color:#fff;
  padding:14px 28px;
  border-radius:999px;
  font-size:14px;
  font-weight:700;
  z-index:300;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
  max-width:90vw;
  text-align:center;
  box-shadow:var(--shadow);
  letter-spacing:-.01em;
}

.toast.show{
  opacity:1;
}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  :root{
    --shadow:4px 4px 0px #1a1a1a;
    --shadow-sm:2px 2px 0px #1a1a1a;
  }
  
  .grid2{
    grid-template-columns:1fr;
  }
  
  .col2{
    grid-column:1;
  }
  
  .topbar{
    padding:0 16px;
    height:64px;
  }
  
  .logo{
    font-size:18px;
    gap:10px;
  }
  
  .logo-mark{
    width:36px;
    height:36px;
    font-size:18px;
  }
  
  .main{
    padding:0 16px;
    margin:24px auto 80px;
    gap:16px;
  }
  
  .page-title{
    font-size:26px;
  }
  
  .card-body{
    padding:18px;
  }
  
  .tx-table th,
  .tx-table td{
    padding:10px 12px;
    font-size:12px;
  }
  
  .tx-table th:nth-child(4),
  .tx-table td:nth-child(4),
  .tx-table th:nth-child(5),
  .tx-table td:nth-child(5){
    display:none;
  }
  
  .btn{
    padding:12px 18px;
    font-size:13px;
  }
}
</style>
</head>
<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner"></div>
    <div class="overlay-title" id="overlayTitle">กำลังดำเนินการ</div>
    <div class="overlay-sub" id="overlaySub">กรุณารอสักครู่...</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- APP -->
<div id="appScreen">
  <!-- TOPBAR -->
  <header class="topbar">
    <a class="logo" href="#">
      <div class="logo-mark">💰</div>
      <span>CHUAY บัญชี</span>
    </a>
    <div class="user-bar">
      <div class="user-pill">
        <div class="user-avatar" id="topAvatar">U</div>
        <span class="user-email" id="topEmail">เข้าสู่ระบบ</span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <div id="formArea">
      
      <!-- PAGE HEADER -->
      <div class="page-header">
        <h1 class="page-title">รายงานเงินสดรับ-จ่าย</h1>
        <p class="page-subtitle" id="welcomeMsg">สวัสดี!</p>
      </div>

      <!-- SUCCESS CARD -->
      <div class="success-card" id="successCard">
        <div class="success-icon">✨</div>
        <h3>บันทึกรายการเรียบร้อยแล้วค่ะ!</h3>
        <button class="btn btn-accent" onclick="document.getElementById('successCard').classList.remove('show')">✨ บันทึกรายการใหม่</button>
      </div>

      <!-- FORM: บันทึกรายการ -->
      <div class="card">
        <div class="card-head">
          <div class="card-title">✍️ บันทึกรายการ</div>
          <span class="card-badge">New</span>
        </div>
        <div class="card-body">
          <div class="grid2">
            <div class="field">
              <label>วันที่<span class="req">*</span></label>
              <input type="date" id="transaction-date"/>
            </div>
            <div class="field">
              <label>รายการ<span class="req">*</span></label>
              <input type="text" id="item-description" placeholder="เช่น ขายสินค้า, ค่าเช่า, ซื้อวัตถุดิบ"/>
            </div>
            <div class="field">
              <label>รายรับ (บาท)</label>
              <input type="number" id="income-amount" value="0" min="0"/>
            </div>
            <div class="field">
              <label>รายจ่าย - ซื้อสินค้า (บาท)</label>
              <input type="number" id="expense-goods" value="0" min="0"/>
            </div>
            <div class="field">
              <label>รายจ่าย - ค่าใช้จ่ายอื่นๆ (บาท)</label>
              <input type="number" id="expense-other" value="0" min="0"/>
            </div>
            <div class="field col2">
              <label>หมายเหตุ</label>
              <input type="text" id="remarks" placeholder="เพิ่มเติม (ถ้ามี)"/>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" onclick="saveTransaction()">💾 บันทึกรายการ</button>
          </div>
        </div>
      </div>

      <!-- TRANSACTIONS TABLE -->
      <div class="card">
        <div class="card-head">
          <div class="card-title">🕒 รายการล่าสุด</div>
          <button class="btn btn-accent btn-sm" onclick="fetchTransactions()">🔄 รีเฟรช</button>
        </div>
        <div class="card-body" style="padding:0;">
          <div id="transactions-list" style="overflow-x:auto;">
            <div style="text-align:center;padding:48px 24px;color:var(--text-muted);font-size:15px;font-weight:700;">กำลังโหลดข้อมูล...</div>
          </div>
        </div>
      </div>

      <!-- FORM: สร้างรายงาน PDF -->
      <div class="card">
        <div class="card-head">
          <div class="card-title">📄 สร้างรายงาน PDF</div>
          <span class="card-badge" style="background:#A5E4FF;color:var(--text);">Report</span>
        </div>
        <div class="card-body">
          <div class="grid2">
            <div class="field">
              <label>จากวันที่<span class="req">*</span></label>
              <input type="date" id="report-start-date"/>
            </div>
            <div class="field">
              <label>ถึงวันที่<span class="req">*</span></label>
              <input type="date" id="report-end-date"/>
            </div>
          </div>
          <div id="reportMessageDiv" style="margin-top:18px;font-size:15px;text-align:center;"></div>
          <div class="form-actions">
            <button class="btn btn-accent" id="generate-report-btn" onclick="generateReport()"><span>📄</span> สร้างรายงาน PDF</button>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script>
// CONFIG
const LIFF_ID = '2010618788-8xUdkoqR';
const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxBbsLZWyKmbRfY_4FMWLjkkfPtFjxWmtK8pg6VRv4SqUztp5fGaR1vcDdqZeLNz6VM/exec';

document.addEventListener('DOMContentLoaded', function() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    const formattedToday = `${yyyy}-${mm}-${dd}`;

    document.getElementById('transaction-date').value = formattedToday;
    document.getElementById('report-end-date').value = formattedToday;
    document.getElementById('report-start-date').value = `${yyyy}-${mm}-01`;

    initializeLiff();
});

async function initializeLiff() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
            liff.login();
        } else {
            const profile = await liff.getProfile();
            document.getElementById('topAvatar').textContent = profile.displayName.charAt(0);
            document.getElementById('topEmail').textContent = 'เข้าสู่ระบบ LINE แล้วค่ะ';
            document.getElementById('welcomeMsg').textContent = 'สวัสดี, ' + profile.displayName + '!';
            fetchTransactions();
        }
    } catch (err) {
        showToast('❌ LIFF Error: ' + (err.message || err));
    }
}

async function callGas(action, payload) {
    let currentToken = liff.getIDToken();
    const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            action: action,
            payload: { ...payload, lineAuth: { idToken: currentToken } }
        })
    });
    const result = await response.json();
    if (!result.success && result.error && result.error.includes('IdToken expired')) {
        alert('เซสชันหมดอายุ ระบบกำลังรีเฟรชใหม่ค่ะ');
        window.location.reload();
    }
    return result;
}

function showOverlay(show, title, sub) {
    document.getElementById('overlay').classList.toggle('show', show);
    if(title) document.getElementById('overlayTitle').textContent = title;
    if(sub) document.getElementById('overlaySub').textContent = sub;
}

let toastT;
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; 
    el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(function(){ el.classList.remove('show'); }, 4000);
}

async function saveTransaction() {
    const transaction = {
        date: document.getElementById('transaction-date').value,
        itemDescription: document.getElementById('item-description').value,
        income: parseFloat(document.getElementById('income-amount').value) || 0,
        expenseGoods: parseFloat(document.getElementById('expense-goods').value) || 0,
        expenseOther: parseFloat(document.getElementById('expense-other').value) || 0,
        remarks: document.getElementById('remarks').value
    };

    if (!transaction.date || !transaction.itemDescription) {
        showToast('⚠️ กรุณากรอกวันที่และรายการให้ครบถ้วนค่ะ');
        return;
    }

    showOverlay(true, 'กำลังบันทึก...', 'กรุณารอสักครู่');
    try {
        const result = await callGas('saveCashTransaction', { transaction: transaction });
        showOverlay(false);
        if (result.success) {
            document.getElementById('successCard').classList.add('show');
            document.getElementById('successCard').scrollIntoView({behavior:'smooth'});
            document.getElementById('item-description').value = '';
            document.getElementById('income-amount').value = '0';
            document.getElementById('expense-goods').value = '0';
            document.getElementById('expense-other').value = '0';
            document.getElementById('remarks').value = '';
            fetchTransactions();
        } else {
            showToast('❌ ' + result.error);
        }
    } catch (error) {
        showOverlay(false);
        showToast('❌ เกิดข้อผิดพลาดในการบันทึกค่ะ');
    }
}

async function fetchTransactions() {
    const listDiv = document.getElementById('transactions-list');
    listDiv.innerHTML = '<div style="text-align:center;padding:48px 24px;color:var(--text-muted);font-size:15px;font-weight:700;">กำลังโหลดข้อมูล...</div>';
    try {
        const result = await callGas('getCashTransactions', {});
        if (result.success && result.transactions.length > 0) {
            let tableHtml = `<div class="table-wrap"><table class="tx-table"><thead><tr><th>วันที่</th><th>รายการ</th><th class="num">รับ</th><th class="num">จ่ายสินค้า</th><th class="num">จ่ายอื่นๆ</th></tr></thead><tbody>`;
            result.transactions.slice(-10).reverse().forEach(t => {
                tableHtml += `<tr><td style="white-space:nowrap;font-size:13px;color:var(--text-muted);font-weight:700;">${t.date.replace('2026-','')}</td><td><div style="font-weight:800;color:var(--text)">${t.itemDescription}</div>${t.remarks ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px">${t.remarks}</div>` : ''}</td><td class="num" style="color:#008A00;font-weight:900;">${t.income > 0 ? t.income.toLocaleString('th-TH') : '-'}</td><td class="num" style="color:#D83B01;font-weight:900;">${t.expenseGoods > 0 ? t.expenseGoods.toLocaleString('th-TH') : '-'}</td><td class="num" style="color:#D83B01;font-weight:900;">${t.expenseOther > 0 ? t.expenseOther.toLocaleString('th-TH') : '-'}</td></tr>`;
            });
            tableHtml += `</tbody></table></div>`;
            listDiv.innerHTML = tableHtml;
        } else if (result.success) {
            listDiv.innerHTML = '<div style="text-align:center;padding:48px 24px;color:var(--text-muted);font-size:15px;font-weight:700;">ยังไม่มีรายการบันทึกค่ะ ✨</div>';
        } else {
            listDiv.innerHTML = `<div style="text-align:center;padding:48px 24px;color:#e53e3e;font-size:15px;font-weight:700;">โหลดรายการไม่สำเร็จ: ${result.error}</div>`;
        }
    } catch (error) {
        listDiv.innerHTML = '<div style="text-align:center;padding:48px 24px;color:#e53e3e;font-size:15px;font-weight:700;">เกิดข้อผิดพลาดในการโหลดรายการค่ะ</div>';
    }
}

async function generateReport() {
    const reportMessageDiv = document.getElementById('reportMessageDiv');
    reportMessageDiv.innerHTML = '';
    const startDate = document.getElementById('report-start-date').value;
    const endDate = document.getElementById('report-end-date').value;
    if (!startDate || !endDate) {
        showToast('⚠️ กรุณาเลือกช่วงวันที่ค่ะ');
        return;
    }
    showOverlay(true, 'กำลังสร้างรายงาน PDF', 'กรุณารอสักครู่ (5-15 วินาที)');
    try {
        const result = await callGas('generateCashReportPDF', { reportData: { startDate: startDate, endDate: endDate } });
        showOverlay(false);
        if (result.success) {
            const fileId = (result.pdfUrl.match(/[-\w]{25,}/) || [])[0];
            const finalUrl = fileId ? 'https://drive.google.com/uc?export=download&id=' + fileId : result.pdfUrl;
            reportMessageDiv.innerHTML = `<div class="card" style="margin:0;box-shadow:var(--shadow-xs);"><div style="background:#FAFBF7;border-bottom:3px solid var(--border);padding:18px 24px;"><div style="font-weight:900;font-size:18px;margin-bottom:12px;letter-spacing:-.01em;">สร้างรายงานสำเร็จแล้วค่ะ! ✨</div><a href="${finalUrl}" target="_blank" class="btn btn-primary" style="width:100%;margin:0;">📄 ดาวน์โหลด PDF</a></div></div>`;
            showToast('✅ สร้าง PDF สำเร็จ!');
        } else {
            showToast('❌ ' + result.error);
        }
    } catch (error) {
        showOverlay(false);
        showToast('❌ เกิดข้อผิดพลาดในการสร้างรายงานค่ะ');
    }
}
</script>
